## Conversion rules per file type\r
\r
### PDF (use `pdf` skill)\r
\r
- Preserve heading structure\r
- Convert tables to Markdown tables (or callout if too wide)\r
- Footnotes → Obsidian footnotes `[^n]`\r
- Page references → keep as `(p. 12)` annotations\r
- Images → if extractable, save to same folder as `<filename>.assets/`; reference with `![](assets/...)`\r
\r
### DOCX (use `docx` skill)\r
\r
- Preserve formatting (bold, italic, headings)\r
- Tracked changes → ignore (use accepted version) unless user says otherwise\r
- Comments → import as `> [!note] Original comment by <author>` callouts\r
- Tables → Markdown tables\r
\r
### XLSX (use `xlsx` skill)\r
\r
- One Markdown file per sheet (or single file with multiple sections — ask user)\r
- If sheet is data dictionary → render as Markdown table directly\r
- If sheet has formulas → preserve as code blocks with the formula\r
- Big sheets (>500 rows) → keep XLSX file as-is in `assets/`, summarise in MD\r
\r
### PPTX (use `pptx` skill)\r
\r
- One H2 per slide\r
- Speaker notes → blockquote under each slide\r
- Slide images → save to `assets/`, reference inline\r
\r
### MD / TXT\r
\r
- Keep as-is, just add proper frontmatter\r
- If TXT, do light cleanup (smart quotes, paragraph spacing)\r
- Detect wikilink candidates and offer to convert plain text → `[[wikilinks]]`\r
\r
### HTML\r
\r
- Use `defuddle` skill to extract clean Markdown\r
- Strip nav, footers, ads\r
\r
## Heuristics\r
\r
| Source pattern | Suggested location |\r
|---|---|\r
| Vendor spec PDF (SCB, BOT, etc.) | `Projects/<PRODUCT>/<vendor>/references/` |\r
| Internal memo / meeting note | `Projects/<PRODUCT>/meeting/YYYY-MM-topic.md` |\r
| Field mapping / data dictionary | `Projects/<PRODUCT>/<integration>/data-dictionary.md` |\r
| Regulatory doc | `Projects/_meta/regulatory/` or sub-team's `_meta/` |\r
| Personal notes | `Projects/<PRODUCT>/notes/` with `status: draft` |\r
| Cross-cutting reference | `Tech/References/` |\r
\r
## Tag suggestions\r
\r
Read 3–5 existing notes in the target folder. Extract their tag patterns. Suggest similar tags for new notes. **Never invent a tag scheme unilaterally** — always offer existing ones first.\r
\r
## Guardrails\r
\r
- **Never** import files without first showing a preview and getting `yes`\r
- **Never** overwrite an existing vault note without explicit `overwrite` confirmation\r
- **Never** make up content that wasn't in the source — if extraction is poor, say so and ask for guidance\r
- **Never** import scanned PDFs (image-only) without warning the user that OCR will be lossy\r
- **Never** strip security/confidentiality markers from source docs — preserve them in the Markdown\r
- If the source is huge (>100 pages, >10MB) — ask the user to confirm before consuming tokens\r
- If the team has `decision-keeper` and the imported doc contains an architectural decision — suggest logging it as an ADR\r
- If frontmatter mentions `confidential` or contains credentials, **stop and ask** what to redact before writing\r
\r
## Frontmatter convention for files you write\r
\r
```yaml\r
---\r
title: <Human-readable title>\r
date: <today YYYY-MM-DD>\r
tags: [<from-existing-convention>]\r
agent_used: doc-to-vault\r
source: <original path>\r
status: <draft|final>          # default: draft until SA review\r
imported_pages: <n>            # for PDFs\r
language: <th|en|mixed>\r
---\r
```\r
\r
