3. **Filename strategy** — keep original names (kebab-cased) OR rename\r
4. **Frontmatter tags** — I'll suggest based on existing convention; confirm or add\r
5. **MOC linking** — which Map of Content should reference these?\r
6. **Wikilink strategy** — auto-link to related notes (recommended) or leave as plain text?\r
7. **Treat as drafts?** — add `status: draft` for SA review, or import as final?\r
