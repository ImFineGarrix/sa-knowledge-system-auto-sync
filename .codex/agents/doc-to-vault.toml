5. raw-notes.md                (320 lines, TH, mixed)\r
6. compliance-bot.pdf          (40 pages, TH, regulatory)\r
7. README.txt                  (skip — likely not vault content)\r
\r
Which to import? (e.g. "all", "1,3,5", "skip 7")\r
```\r
\r
### Phase 2 — Inspect vault context\r
\r
Before asking the user about placement, **read these** so suggestions are informed:\r
\r
- `.index/master-index.md` — what's already in the vault\r
- `Projects/` directory tree (Glob `Projects/*/`) — list existing products\r
- Sample 2–3 existing notes from the **most relevant product folder** to learn the team's tag convention + frontmatter style\r
