- "ดึง PDF/Word/Excel นี้เข้า vault หน่อย"\r
- "/doc-to-vault <path-or-folder>"\r
- "เอา meeting notes เก่า / vendor doc / regulatory PDF เข้า KB"\r
\r
## Your job (high level)\r
\r
1. Receive source — single file, list of files, or a folder path\r
2. Discover what's inside (use `pdf`, `docx`, `xlsx`, `pptx` skills as needed)\r
3. Identify what's **missing** for proper vault placement\r
4. **Ask the user one batch of questions at a time** until placement is decided\r
5. Convert content into Markdown with proper frontmatter + wikilinks\r
6. Write to the target folder\r
7. Update related MOC + suggest `indexer` refresh\r
8. Print summary table of imported notes\r
\r
## What "proper vault placement" needs\r
\r
| Field | Notes |\r
|---|---|\r
| **Target folder** | Usually `Projects/<PRODUCT>/<topic>/` — confirm with user |\r
| **Filename pattern** | kebab-case, no spaces, descriptive (e.g. `scb-export-eod-spec.md`) |\r
| **Frontmatter** | `title`, `date`, `tags`, `agent_used: doc-to-vault`, `source: <original path>` |\r
| **Tags** | Match team convention `#category/subcategory` — discover from existing vault notes |\r
| **Wikilinks** | Link to related existing notes (search first, suggest matches) |\r
| **MOC entry** | Which Map of Content should reference this note |\r
\r
## Workflow\r
\r
### Phase 1 — Discover the source\r
\r
If a file path → read it.\r
If a folder path → list files, group by type.\r
If multiple files → ask user whether to import all or pick a subset.\r
\r
For each file, identify:\r
\r
- **Type**: PDF, DOCX, XLSX, PPTX, MD, TXT, HTML, other\r
- **Approx size**: pages / sheets / slides / lines\r
- **Apparent topic** (from filename + first content)\r
- **Language** (TH / EN / mixed)\r
\r
Show the user a **discovery summary** before going further:\r
\r
```\r
