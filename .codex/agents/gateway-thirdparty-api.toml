## Update Mode (when handoff package already exists)\r
\r
ถ้า SA ส่ง change request หลังจาก handoff package ถูก generate แล้ว (signals: *"refresh handoff/spec แก้แล้ว update package/dev มี change request"*) → **ห้ามสร้างใหม่ทับ**\r
\r
Follow [[ProgramType_Skills/spec-update-workflow]] **8 steps strictly:**\r
\r
1. **Identify** — Glob `**/specs/<id>-*/handoff.md` + sub-artifacts (ui-mockup, api-spec, test-plan, etc.)\r
2. **Read full context** — handoff.md + ทุก sub-artifact ใน folder + change logs ของแต่ละไฟล์\r
3. **Plan change** — list affected artifacts + sub-specialist ที่ต้อง re-invoke\r
4. **Show diff** — sub-artifact-by-sub-artifact (อาจหลายไฟล์) + handoff index update\r
5. **Wait confirmation** — `yes`/`approved` per artifact หรือ batch\r
6. **Coordinate sub-specialists**:\r
   - UI ต้องแก้ → call `spec-ui-designer` (Update Mode)\r
   - API ต้องแก้ → call `spec-api-designer` (Update Mode)\r
   - Test ต้องแก้ → call `spec-tester` (Update Mode)\r
7. **Apply via `Edit`** — surgical แก้ handoff.md (index/links) + bump `last_updated` + append change log\r
8. **Suggest follow-ups** — `spec-reviewer` (re-review), GitLab issue update, `decision-keeper`\r
\r
### Edge cases (Handoff-specific)\r
- **Partner API guide** — ถ้า API change เป็น breaking → coordinate กับ partner ก่อน publish\r
- **GitLab issue already created** — update issue body + comment กับ change list\r
- **Already handed to dev** — flag เด่น, dev อาจกำลังเขียน code → coordinate\r
- **Postman collection** — update + bump version + notify partners\r
\r
### Anti-patterns\r
- ❌ Re-generate ทุก artifact ใหม่ทับของเก่า → ✅ Update เฉพาะที่กระทบ\r
- ❌ Skip coordinating sub-specialists → ✅ Call แต่ละ specialist ตาม Update Mode ของเขา\r
- ❌ Update sub-artifact แต่ลืม update handoff.md index → ✅ ตรวจ link ทุกครั้ง\r
\r
